name: SonarCloud Analysis
on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and Analyze
    runs-on: ubuntu-latest

    # --- SERVIZIO DATABASE ---
    services:
      mysql:
        image: mysql:8.0
        env:
          # Corretto: rimosso il '$' finale che avevi per errore
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: hoophub
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    # -------------------------

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # --- INIZIALIZZAZIONE DB (METODO SICURO) ---
      - name: Initialize Database Schema
        env:
          # Passiamo la password come variabile d'ambiente (evita errori di sintassi con spazi/quote)
          MYSQL_PWD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "Verifica presenza file SQL..."
          ls -l src/test/resources/hoophub_script.sql
          
          echo "Attesa avvio MySQL..."
          sleep 10 
          
          echo "Esecuzione script..."
          # NOTA: Non serve -p, la password viene letta da MYSQL_PWD
          mysql -h 127.0.0.1 -P 3306 -u root hoophub < src/test/resources/hoophub_script.sql
      # -------------------------------------------

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Comando ripulito da typos (.xmly) e duplicati
        run: mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=EliaCinti_HoopHub2 -Dsonar.organization=eliacinti -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml