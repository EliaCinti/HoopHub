name: SonarCloud Analysis
on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and Analyze
    runs-on: ubuntu-latest

    # --- AGGIUNTA FONDAMENTALE: IL DATABASE ---
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}$      # <--- CONTROLLA CHE IL TUO CODICE JAVA USI QUESTA PASSWORD
          MYSQL_DATABASE: hoophub        # <--- CONTROLLA CHE IL DB SI CHIAMI COSI NEL CODICE
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    # ------------------------------------------

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # --- AGGIUNGI QUESTO STEP QUI SOTTO ---
      - name: Initialize Database Schema
        run: |
          # Aspetta che MySQL sia pronto (opzionale ma sicuro)
          sleep 10 
          # Esegui lo script SQL. 
          # SOSTITUISCI 'LA_TUA_PASSWORD' con quella che hai scritto nella sezione services sopra!
          mysql -h 127.0.0.1 -P 3306 -u root -p "${{ secrets.DB_PASSWORD }}" hoophub < src/test/resources/hoophub_script.sql
      # --------------------------------------
      # Importante: Aspettiamo che il DB sia pronto (opzionale ma consigliato se il servizio è lento)
      # In realtà l'opzione --health-cmd sopra ci aiuta già.

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=EliaCinti_HoopHub2 -Dsonar.organization=eliacinti -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xmly sonar:sonar -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml